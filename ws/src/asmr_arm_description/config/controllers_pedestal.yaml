controller_manager:
  ros__parameters:
    update_rate: 500  # Hz

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    arm_pid_controller:
      type: pid_controller/PidController

# ---------------------------------------------------------------------------
# arm_pid_controller -- COMPLETE THIS BLOCK (Task 1).
# Every value below is left empty for you to fill. The interface fields list
# their valid options in the comment; the gains are floats you choose and tune.
# Until the block is complete the controller will not configure and the arm
# stays limp.
# ---------------------------------------------------------------------------
arm_pid_controller:
  ros__parameters:
    dof_names:                           # the actuated joints (see the URDF / /joint_states)

    command_interface:                   # one of: position | velocity | effort
    reference_and_state_interfaces:      # list of: position | velocity   (e.g. ["velocity"])
    set_current_state_as_first_setpoint: # bool: true | false

    gains:
      shoulder:
        p:                  # float
        i:                  # float
        d:                  # float
        u_clamp_max:        # float
        u_clamp_min:        # float
        feedforward_gain:   # float
      elbow:
        p:                  # float
        i:                  # float
        d:                  # float
        u_clamp_max:        # float
        u_clamp_min:        # float
        feedforward_gain:   # float
